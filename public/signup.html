<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - Xiah's Baking AI</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="signup">
    <main class="auth-page-main">
      <section class="auth-card">
        <h1>Create Account</h1>
        <p>Sign up to access recipes, AI helper, and your baking workspace.</p>

        <form id="signup-user-form" class="admin-form">
          <label for="signup-name">Full name</label>
          <input id="signup-name" type="text" placeholder="Your full name" required />

          <label for="signup-email">Email</label>
          <input id="signup-email" type="email" placeholder="you@example.com" required />

          <label for="signup-password">Password</label>
          <input id="signup-password" type="password" placeholder="At least 8 characters" required />

          <label for="signup-confirm-password">Confirm password</label>
          <input id="signup-confirm-password" type="password" placeholder="Re-enter your password" required />

          <button type="submit" class="button button-primary">Create Account</button>
        </form>

        <p id="signup-status" class="status-message hidden" aria-live="polite"></p>
        <p class="auth-switch">Already have an account? <a href="login.html">Login</a></p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
